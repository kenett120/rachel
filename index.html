<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Rachel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb);
    background-size: 600% 600%;
    animation: fondo 10s ease infinite;
}

/* fondo animado */
@keyframes fondo {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* corazones */
.heart {
    position: fixed;
    top: 0;
    color: #ff4d6d;
    animation: float 6s linear infinite;
    opacity: 0.8;
    pointer-events: none;
    z-index: 999;
}

@keyframes float {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    50% { opacity: 1; }
    100% {
        transform: translateY(-10vh) scale(1.3);
        opacity: 0;
    }
}

/* pétalos */
.petal {
    position: fixed;
    top: 0;
    width: 12px;
    height: 18px;
    background: radial-gradient(circle at 30% 30%, #ff6b81, #c9184a);
    border-radius: 60% 40% 60% 40%;
    animation: fall 8s linear infinite;
    opacity: 0.8;
    pointer-events: none;
    z-index: 998;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
    }
    20% { opacity: 1; }
    100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}

/* contenedor */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* cards */
.card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(255, 100, 150, 0.5);
    max-width: 400px;
    animation: aparecer 1s ease;
}

@keyframes aparecer {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background-color: #ff4d6d;
    color: white;
    cursor: pointer;
}

.hidden { display: none; }

canvas { display: block; }

</style>
</head>
<body>

<div class="container">

<div class="card" id="pantalla1">
    <h1>Hola mi vida</h1>
    <p>Tengo algo especial para ti...</p>
    <button onclick="siguiente(1)">Continuar</button>
</div>

<div class="card hidden" id="pantalla2">
    <h1>Eres increíble</h1>
    <p>Tu esfuerzo valdrá la pena, Dios estará contigo.</p>
    <button onclick="siguiente(2)">Siguiente</button>
</div>

<div class="card hidden" id="pantalla3">
    <h1>Confía en ti</h1>
    <p>Vas a brillar y a cumplir tus sueños.</p>
    <button onclick="siguiente(3)">Siguiente</button>
</div>

<div class="card hidden" id="pantalla4">
    <h1>Ten mucha fe</h1>
    <p>El Selectivo será el mejor de todos.</p>
    <button onclick="final()">Ver sorpresa</button>
</div>

</div>

<audio id="musica" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
function siguiente(num) {
    document.getElementById("pantalla"+num).classList.add("hidden");
    document.getElementById("pantalla"+(num+1)).classList.remove("hidden");
}

/* corazones */
function crearCorazon() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (12 + Math.random() * 20) + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(crearCorazon, 200);

/* pétalos */
function crearPetalo() {
    const petal = document.createElement("div");
    petal.className = "petal";

    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (6 + Math.random() * 4) + "s";
    petal.style.transform = `rotate(${Math.random()*360}deg)`;

    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 8000);
}
setInterval(crearPetalo, 250);

/* girasoles */
function sunflower(ctx,x,y,scale){
    for(let i=0;i<700;i++){
        let angle = Math.random()*Math.PI*2;
        let r = 60*scale + Math.random()*60*scale;
        let px = x + Math.cos(angle)*r;
        let py = y + Math.sin(angle)*r;

        ctx.beginPath();
        ctx.fillStyle = `hsl(${50+Math.random()*10},100%,${55+Math.random()*10}%)`;
        ctx.ellipse(px,py,20*scale,7*scale,angle,0,Math.PI*2);
        ctx.fill();
    }

    ctx.beginPath();
    ctx.fillStyle = "#5a3e1b";
    ctx.arc(x, y, 45*scale, 0, Math.PI*2);
    ctx.fill();

    for(let i=0;i<1200;i++){
        let angle = Math.random()*Math.PI*2;
        let r = Math.random()*40*scale;
        let px = x + Math.cos(angle)*r;
        let py = y + Math.sin(angle)*r;

        ctx.beginPath();
        ctx.fillStyle = `hsl(40,60%,${35+Math.random()*25}%)`;
        ctx.arc(px,py,3.5*scale,0,Math.PI*2);
        ctx.fill();
    }
}

function final() {
    document.body.innerHTML = `<canvas id="lienzo"></canvas>`;

    const canvas = document.getElementById("lienzo");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2 + 100;

    ctx.strokeStyle="green";
    ctx.lineWidth=4;
    for(let i=-2;i<=2;i++){
        ctx.beginPath();
        ctx.moveTo(cx, cy+250);
        ctx.lineTo(cx+i*80, cy);
        ctx.stroke();
    }

    sunflower(ctx, cx-160, cy-60,1.6);
    sunflower(ctx, cx, cy-120,1.8);
    sunflower(ctx, cx+160, cy-60,1.6);
    sunflower(ctx, cx-80, cy+40,1.4);
    sunflower(ctx, cx+80, cy+40,1.4);

    ctx.fillStyle="white";
    ctx.font="32px Arial";
    ctx.textAlign="center";
    ctx.fillText("Rachelita", canvas.width/2, 40);
    ctx.fillText("Este ramo es para ti", canvas.width/2, 80);
    ctx.fillText("Te amo", canvas.width/2, 120);
}

/* música */
window.addEventListener("click", () => {
    const audio = document.getElementById("musica");
    audio.play();
}, { once: true });
</script>

</body>
</html>
